<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Ops Agent</title>
    <style>
      :root {
        --bg: #f4efe5;
        --card: #fffaf0;
        --ink: #1f2a35;
        --accent: #0f766e;
        --accent-2: #b45309;
        --muted: #6b7280;
        --line: #d1d5db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Trebuchet MS", Tahoma, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 500px at -20% -10%, #f59e0b33, transparent),
          radial-gradient(800px 500px at 120% -10%, #0ea5e933, transparent),
          var(--bg);
      }
      .shell {
        max-width: 980px;
        margin: 24px auto;
        padding: 0 16px 16px;
      }
      .title {
        margin: 0 0 14px;
        font-size: 32px;
        letter-spacing: 0.4px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 22px #00000012;
      }
      .chat-log {
        min-height: 340px;
        max-height: 54vh;
        overflow-y: auto;
        padding: 16px;
        display: grid;
        gap: 10px;
      }
      .bubble {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #fff;
      }
      .bubble.user {
        border-color: #93c5fd;
        background: #eff6ff;
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding: 12px;
      }
      #message {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 15px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #0ea5e9);
        color: #fff;
        font-weight: 600;
        padding: 10px 14px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.04); }
      .raw {
        margin-top: 14px;
        background: #111827;
        color: #d1fae5;
        border-radius: 12px;
        border: 1px solid #1f2937;
        padding: 12px;
        font-size: 12px;
        overflow-x: auto;
        min-height: 120px;
      }
      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .utility {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .link-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #fef3c7;
        color: var(--accent-2);
        font-size: 12px;
      }
      @media (max-width: 640px) {
        .title { font-size: 25px; }
        .controls { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 class="title">Personal Ops Agent <span class="badge">/chat UI</span></h1>
      <section class="panel">
        <div id="chatLog" class="chat-log"></div>
        <form id="chatForm" class="controls">
          <input id="message" autocomplete="off" placeholder="Try: what's my schedule today? / 去纽约要多久 / 提醒我明天交作业" />
          <button type="submit">Send</button>
        </form>
      </section>
      <div class="hint">This UI sends POST requests to <code>/chat</code>.</div>
      <div class="utility">
        <a class="link-pill" href="/showcase">Open Project Showcase</a>
      </div>
      <pre id="raw" class="raw">{ "status": "idle" }</pre>
    </main>

    <script>
      const chatLog = document.getElementById("chatLog");
      const chatForm = document.getElementById("chatForm");
      const messageInput = document.getElementById("message");
      const rawView = document.getElementById("raw");

      function appendBubble(kind, text, meta) {
        const box = document.createElement("div");
        box.className = `bubble ${kind}`;
        const metaEl = document.createElement("div");
        metaEl.className = "meta";
        metaEl.textContent = meta;
        const body = document.createElement("div");
        body.textContent = text;
        box.append(metaEl, body);
        chatLog.appendChild(box);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function sendMessage(message) {
        appendBubble("user", message, "You");
        rawView.textContent = '{ "status": "loading" }';
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });
          const data = await res.json();
          const meta = `Agent | intent=${data.intent} | trace_id=${data.trace_id}`;
          appendBubble("agent", data.output || "(empty)", meta);
          rawView.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          appendBubble("agent", "Request failed. Check server logs.", "Agent | error");
          rawView.textContent = JSON.stringify({ error: String(err) }, null, 2);
        }
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;
        messageInput.value = "";
        await sendMessage(message);
      });
    </script>
  </body>
</html>
